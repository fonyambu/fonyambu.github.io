# Site Settings
locale: "en-US"
title: "Frank G. Onyambu"
title_separator: "|"
name: "Frank G. Onyambu"
description: "Genomics, immunogenetics, pharmacogenomics, and multiomics across East Africa and the Horn of Africa."
url: "https://fonyambu.github.io"
baseurl: ""
repository: "fonyambu/fonyambu.github.io"

# Site Author
author:
  name: "Frank G. Onyambu, PhD"
  avatar: "profile.png"
  bio: "Genomics and multiomics researcher. CEO and CSO, Continental Molecular Biosystems. Founder, CMB Genomics."
  location: "Nairobi, Kenya"
  employer: "Continental Molecular Biosystems"
  uri: "https://continentalmolecular.bio"
  email: "frank@cmbgenomics.org"
  googlescholar: "https://scholar.google.com/citations?user=Vu8XmMIAAAAJ"
  orcid: "https://orcid.org/0000-0002-1195-8762"
  pubmed: "https://pubmed.ncbi.nlm.nih.gov/?term=onyambu+frank"
  github: "fonyambu"
  linkedin: "frank-onyambu-phd-23a27187"

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - node_modules

# Collections
collections:
  publications:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/
  teaching:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true
